<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Completar stock</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      color: #1d252c;
      background: #f4f6f8;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    main {
      width: min(760px, calc(100vw - 32px));
      background: #ffffff;
      border: 1px solid #d9e0e7;
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 18px 44px rgba(20, 31, 43, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }
    p {
      margin: 0 0 24px;
      color: #53616f;
      line-height: 1.5;
    }
    form {
      display: grid;
      gap: 18px;
    }
    label {
      display: grid;
      gap: 8px;
      font-weight: 700;
    }
    input[type="file"] {
      border: 1px solid #c8d2dc;
      border-radius: 6px;
      padding: 12px;
      background: #fbfcfd;
      font: inherit;
    }
    button {
      justify-self: start;
      border: 0;
      border-radius: 6px;
      background: #12715b;
      color: #fff;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }
    #estado {
      min-height: 22px;
      color: #33414f;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Completar stock</h1>
    <p>Subí la planilla base y los reportes. El sistema cruza SKU, color y talle, completa C, L, M, R, B, D, E y CO, y descarga el Excel terminado.</p>

    <form id="formulario">
      <label>
        Planilla STOCK.xlsx
        <input name="stock" type="file" accept=".xlsx" required>
      </label>

      <label>
        Reportes .xls / .xlsx
        <input name="reports" type="file" accept=".xls,.xlsx" multiple required>
      </label>

      <button type="submit">Procesar y descargar</button>
      <div id="estado" aria-live="polite"></div>
    </form>
  </main>

  <script>
    const form = document.querySelector("#formulario");
    const button = form.querySelector("button");
    const statusBox = document.querySelector("#estado");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      button.disabled = true;
      statusBox.textContent = "Procesando...";

      try {
        const endpoint = window.location.protocol === "file:"
          ? "http://127.0.0.1:8765/procesar"
          : "/procesar";

        const response = await fetch(endpoint, {
          method: "POST",
          body: new FormData(form)
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || "No se pudo procesar la planilla.");
        }

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "STOCK_COMPLETADO.xlsx";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        statusBox.textContent = "Listo. Se descargó STOCK_COMPLETADO.xlsx.";
      } catch (error) {
        statusBox.textContent = "Error: " + error.message;
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
